name: moodle-proctor
root: /home/aryaniyaps/web-projects/moodle-proctor

# Optional: Attach to session when running tmuxinator
attach: true

# Post-session commands (when closing tmux)
# on_project_stop: docker-compose stop

windows:
  - Docker Compose:
      layout: even-horizontal
      panes:
        - Infrastructure Services:
            - docker-compose up postgres mariadb moodle

  - Local Development:
      layout: tiled
      panes:
        - Backend (Fastify):
            - cd backend
            - npm run dev
        - Frontend (Teacher Dashboard):
            - cd frontend
            - npm run dev
        - AI Proctoring (FastAPI):
            - cd ai_proctoring
            - uv run uvicorn main:app --reload --host 0.0.0.0 --port 8000
        - Mobile Scanning Client:
            - cd Scanning-and-Uploading/exam-system-mobile-client-main
            - npm run dev

  - Manual Proctoring:
      layout: even-horizontal
      panes:
        - Electron App:
            - cd manual_proctoring
            - npm start
