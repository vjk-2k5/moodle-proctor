<!DOCTYPE html>
<html>

<head>
<title>Join Exam Session</title>
<link rel="stylesheet" href="css/style.css">
<style>
.join-info {
  margin: 20px 0;
  padding: 14px;
  background: #f8fafc;
  border: 1px solid #d0d5dd;
  border-radius: 8px;
  font-size: 14px;
  color: #475467;
  text-align: left;
}

.join-info strong {
  color: #101828;
  display: block;
  margin-bottom: 6px;
}
</style>
</head>

<body>

<div class="container">

<h2>Join Exam Session</h2>

<p class="join-info">
  <strong>Enter your details to begin the exam session</strong>
  Use the same name and email that were registered for this exam.
</p>

<input id="studentName" type="text" placeholder="Your Full Name" autocomplete="name">

<input id="studentEmail" type="email" placeholder="Your Email Address" autocomplete="email">

<input id="roomCode" type="text" placeholder="Exam Code (for example, Xy7Ab9Pq)" maxlength="8" style="text-transform: uppercase; font-family: 'Courier New', monospace; letter-spacing: 2px;">

<p id="joinMessage" class="status-message" hidden></p>

<button id="joinButton" onclick="joinRoom()">Continue</button>

</div>

<script src="js/auth.js"></script>
<script src="js/join.js"></script>

</body>
</html>
