# ============================================================================
# GitHub Actions CI/CD Pipeline for Moodle-Proctor
# Comprehensive testing and deployment pipeline
# ============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.11'
  POSTGRES_VERSION: '15'

jobs:
  # ============================================================================
  # LINTING & STATIC ANALYSIS
  # ============================================================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Install Python dependencies
        run: |
          cd ai_proctoring
          pip install -r requirements.txt

      - name: Lint backend
        run: |
          cd backend
          npm run lint

      - name: Lint frontend
        run: |
          cd frontend
          npm run lint

      - name: Type check backend
        run: |
          cd backend
          npm run type-check || npx tsc --noEmit

      - name: Type check frontend
        run: |
          cd frontend
          npm run type-check || npx tsc --noEmit

      - name: Python linting
        run: |
          cd ai_proctoring
          pip install flake8 black isort mypy
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          black --check .
          isort --check-only .

  # ============================================================================
  # UNIT TESTS
  # ============================================================================
  unit-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: proctor_user
          POSTGRES_PASSWORD: proctor_pass
          POSTGRES_DB: moodle_proctor_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Install Python dependencies
        run: |
          cd ai_proctoring
          pip install -r requirements.txt pytest pytest-cov pytest-asyncio

      - name: Setup test database
        run: |
          cd backend
          npm run migrate
        env:
          DATABASE_URL: postgresql://proctor_user:proctor_pass@localhost:5432/moodle_proctor_test

      - name: Run backend unit tests
        run: |
          cd backend
          npm run test:unit
        env:
          DATABASE_URL: postgresql://proctor_user:proctor_pass@localhost:5432/moodle_proctor_test
          NODE_ENV: test

      - name: Run Python unit tests
        run: |
          cd ai_proctoring
          python -m pytest tests/unit/ -v --cov=. --cov-report=xml

      - name: Upload backend coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage/lcov.info
          flags: backend
          name: Backend Coverage

      - name: Upload Python coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./ai_proctoring/coverage.xml
          flags: ai-proctoring
          name: AI Proctoring Coverage

  # ============================================================================
  # INTEGRATION TESTS
  # ============================================================================
  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: proctor_user
          POSTGRES_PASSWORD: proctor_pass
          POSTGRES_DB: moodle_proctor_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Setup test database
        run: |
          cd backend
          npm run migrate
        env:
          DATABASE_URL: postgresql://proctor_user:proctor_pass@localhost:5432/moodle_proctor_test

      - name: Run integration tests
        run: |
          cd backend
          npm run test:integration
        env:
          DATABASE_URL: postgresql://proctor_user:proctor_pass@localhost:5432/moodle_proctor_test
          NODE_ENV: test

  # ============================================================================
  # E2E TESTS
  # ============================================================================
  e2e-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: proctor_user
          POSTGRES_PASSWORD: proctor_pass
          POSTGRES_DB: moodle_proctor_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Setup test database
        run: |
          cd backend
          npm run migrate
        env:
          DATABASE_URL: postgresql://proctor_user:proctor_pass@localhost:5432/moodle_proctor_test

      - name: Install Playwright
        run: |
          cd backend
          npx playwright install --with-deps

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Start backend for E2E tests
        run: |
          cd backend
          npm run start &
          sleep 10
        env:
          DATABASE_URL: postgresql://proctor_user:proctor_pass@localhost:5432/moodle_proctor_test
          NODE_ENV: test
          PORT: 5000

      - name: Run E2E tests
        run: |
          cd backend
          npm run test:e2e
        env:
          DATABASE_URL: postgresql://proctor_user:proctor_pass@localhost:5432/moodle_proctor_test
          NODE_ENV: test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: backend/test-results/
          retention-days: 30

  # ============================================================================
  # SECURITY SCANNING
  # ============================================================================
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run npm audit
        run: |
          cd backend
          npm audit --audit-level moderate || true
          cd ../frontend
          npm audit --audit-level moderate || true

      - name: Run safety check for Python
        run: |
          pip install safety
          cd ai_proctoring
          safety check --full-report || true

  # ============================================================================
  # BUILD DOCKER IMAGES
  # ============================================================================
  build-docker:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, e2e-tests]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push AI proctoring image
        uses: docker/build-push-action@v5
        with:
          context: ./ai_proctoring
          file: ./ai_proctoring/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/ai-proctoring:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # DEPLOYMENT (Optional - requires manual trigger)
  # ============================================================================
  deploy:
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # environment: production
    steps:
      - name: Deploy to production
        run: |
          echo "Deployment logic goes here"
          echo "This could trigger Azure deployment, AWS ECS, etc."
          # Add your deployment commands here